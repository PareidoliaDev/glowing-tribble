name: build

on:
  schedule:
    - cron: "20 */6 * * *"
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: jupiter-kernel-build
  cancel-in-progress: false

env:
  MIRROR: https://steamdeck-packages.steamos.cloud/archlinux-mirror
  MIN_KVER: "6.11"   # ignore kernel series older than this
  KEEP: "20"         # newest N sub-builds to build per kernel series

jobs:
  discover:
    runs-on: ubuntu-latest
    outputs:
      series: ${{ steps.set.outputs.series }}
      fingerprint: ${{ steps.set.outputs.fingerprint }}
      should_build: ${{ steps.set.outputs.should_build }}
    steps:
      - id: set
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          repos=$(curl -fsSL "$MIRROR/" \
            | grep -oE 'href="jupiter-[^"/]+/"' \
            | sed -E 's|href="([^"]+)/"|\1|' | sort -u)
          : > /tmp/packages
          : > /tmp/pairs
          for r in $repos; do
            curl -fsSL "$MIRROR/$r/os/x86_64/" 2>/dev/null \
              | grep -oE 'linux-neptune-[a-zA-Z0-9_-]+-headers-[0-9][^"<]*\.pkg\.tar\.zst' \
              >> /tmp/packages || true
          done
          sort -Vu -o /tmp/packages /tmp/packages
          sed -E 's/(linux-neptune-[a-zA-Z0-9_-]+-headers)-([0-9]+\.[0-9]+).*/\2 \1/' \
            /tmp/packages | sort -u > /tmp/pairs
          series=$(sort -u /tmp/pairs | while read -r ver name; do
            if [ "$(printf '%s\n%s\n' "$MIN_KVER" "$ver" | sort -V | head -1)" = "$MIN_KVER" ]; then
              echo "$name"
            fi
          done | sort -u)
          if [ -z "$series" ]; then
            echo "No kernel series >= $MIN_KVER found" >&2; exit 1
          fi
          echo "Series to build:"; echo "$series"
          json=$(printf '%s\n' $series | jq -R . | jq -cs .)
          echo "series=$json" >> "$GITHUB_OUTPUT"

          # The newest KEEP packages in every supported series define the input
          # set. A changed set means Jupiter published a kernel update.
          : > /tmp/selected
          while read -r name; do
            grep -E "^${name}-[0-9]" /tmp/packages | sort -V | tail -n "$KEEP" \
              >> /tmp/selected
          done <<< "$series"
          fingerprint=$(sort -u /tmp/selected | sha256sum | cut -d' ' -f1)
          latest=$(sort -V /tmp/selected | tail -n 1)
          echo "fingerprint=$fingerprint" >> "$GITHUB_OUTPUT"
          echo "Jupiter input fingerprint: $fingerprint"
          echo "Newest package: $latest"

          previous=$(gh api "repos/$GITHUB_REPOSITORY/releases/latest" --jq .body 2>/dev/null \
            | sed -n 's/^Jupiter fingerprint: `\([^`]*\)`.*/\1/p' | head -n 1 || true)
          if [ "$GITHUB_EVENT_NAME" = schedule ] && [ "$fingerprint" = "$previous" ]; then
            echo "No new Jupiter kernel update; skipping the build."
            echo "should_build=false" >> "$GITHUB_OUTPUT"
          else
            echo "New Jupiter kernel input (or a non-scheduled run); building."
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: discover
    if: needs.discover.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
    strategy:
      fail-fast: false
      matrix:
        series: ${{ fromJSON(needs.discover.outputs.series) }}
    steps:
      - uses: actions/checkout@v7

      - name: Add repositories
        run: |
          # `pacman -U` on individual (unsigned) .pkg files needs sig checks off.
          sed -i 's/^SigLevel.*/SigLevel = Never/' /etc/pacman.conf
          repos=$(curl -fsSL "$MIRROR/" \
            | grep -oE 'href="jupiter-[^"/]+/"' \
            | sed -E 's|href="([^"]+)/"|\1|' | sort -u)
          for r in $repos; do
            if curl -fsSL -o /dev/null "$MIRROR/$r/os/x86_64/$r.db"; then
              { echo; echo "[$r]"; echo "Server = $MIRROR/\$repo/os/\$arch"; echo "SigLevel = Never"; } >> /etc/pacman.conf
            fi
          done

      - name: Install toolchain
        run: pacman -Syu --noconfirm base-devel clang make lld llvm git
        
      - name: Restore build cache
        uses: actions/cache@v6
        with:
          path: ${{ runner.temp }}/modcache
          key: modcache-${{ matrix.series }}-${{ github.run_id }}
          restore-keys: |
            modcache-${{ matrix.series }}-

      - name: Build ${{ matrix.series }}
        run: |
          set -uo pipefail
          SERIES="${{ matrix.series }}"
          OUT="${RUNNER_TEMP:-/tmp}/out"; mkdir -p "$OUT"
          CACHE="${RUNNER_TEMP:-/tmp}/modcache"
          mkdir -p "$CACHE/modules"
          MANIFEST="$CACHE/built.tsv"
          touch "$MANIFEST"

          # Enumerate this series' headers .pkg files across Jupiter channels
          declare -A URLOF
          for repo in $(pacman-conf --repo-list); do
            case "$repo" in jupiter-*) ;; *) continue ;; esac
            base="$MIRROR/$repo/os/x86_64"
            while read -r f; do
              [ -n "$f" ] || continue
              [ -n "${URLOF[$f]:-}" ] && continue
              URLOF[$f]="$base/$f"
            done < <(curl -fsSL "$base/" \
              | grep -oE "${SERIES}-[0-9][^\"]*\.pkg\.tar\.zst" | sort -u)
          done

          mapfile -t buildfiles < <(printf '%s\n' "${!URLOF[@]}" | sort -V | tail -n "$KEEP")
          echo "Considering ${#buildfiles[@]} sub-builds of $SERIES"

          ok=(); failed=(); skipped=()
          for f in "${buildfiles[@]}"; do
            # obtain cached build
            cached_kver=$(awk -F'\t' -v f="$f" '$1==f{print $2}' "$MANIFEST" | tail -n1)
            if [ -n "$cached_kver" ] && [ -f "$CACHE/modules/$cached_kver.ko" ]; then
              echo "=== Skipping $f (already built for $cached_kver) ==="
              cp "$CACHE/modules/$cached_kver.ko" "$OUT/cpuid_fault_emulation-$cached_kver.ko"
              skipped+=("$cached_kver")
              continue
            fi

            echo "> Installing $f "
            if ! pacman -U --noconfirm --overwrite '*' "${URLOF[$f]}"; then
              echo "install failed: $f" >&2; failed+=("$f"); continue
            fi
            d=$(ls -d /lib/modules/*/build 2>/dev/null | head -1)
            KERNEL_VERSION=$(basename "$(dirname "$d")")
            echo "> Building for $KERNEL_VERSION"
            KERNEL="$KERNEL_VERSION" make clean || true
            if KERNEL="$KERNEL_VERSION" make; then
              cp cpuid_fault_emulation.ko "$OUT/cpuid_fault_emulation-$KERNEL_VERSION.ko"
              cp cpuid_fault_emulation.ko "$CACHE/modules/$KERNEL_VERSION.ko"
              printf '%s\t%s\n' "$f" "$KERNEL_VERSION" >> "$MANIFEST"
              ok+=("$KERNEL_VERSION"); echo "OK: $KERNEL_VERSION"
            else
              failed+=("$KERNEL_VERSION"); echo "FAILED: $KERNEL_VERSION" >&2
            fi
            pacman -Rdd --noconfirm "$SERIES" || true
          done

          echo "Built:"; ls -la "$OUT"
          {
            echo "## $SERIES"
            echo "Succeeded (${#ok[@]}):";  for k in "${ok[@]}";      do echo "- Completed  $k"; done
            echo "Skipped/cached (${#skipped[@]}):"; for k in "${skipped[@]}"; do echo "- Cache/Skip  $k"; done
            echo "Failed (${#failed[@]}):"; for k in "${failed[@]}"; do echo "- FAIL  $k"; done
          } | tee -a "${GITHUB_STEP_SUMMARY:-/dev/stderr}"
          exit 0

      - name: Upload ${{ matrix.series }} modules
        uses: actions/upload-artifact@v7
        with:
          name: modules-${{ matrix.series }}
          path: ${{ runner.temp }}/out/*.ko
          if-no-files-found: ignore

  release:
    needs: [discover, build]
    if: needs.discover.outputs.should_build == 'true' && needs.build.result == 'success' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v8
        with:
          pattern: modules-*
          path: out
          merge-multiple: true

      - id: release_info
        env:
          FINGERPRINT: ${{ needs.discover.outputs.fingerprint }}
        run: |
          echo "tag=v$(date +'%Y.%m.%d')-${GITHUB_SHA:0:7}-${FINGERPRINT:0:12}" >> "$GITHUB_OUTPUT"
          echo "date=$(date +'%Y-%m-%d %H:%M:%S UTC')" >> "$GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ steps.release_info.outputs.tag }}
          name: "SteamOS ${{ steps.release_info.outputs.tag }}"
          body: |
            Automated build for SteamOS created on ${{ steps.release_info.outputs.date }}
            Jupiter fingerprint: `${{ needs.discover.outputs.fingerprint }}`
          files: out/*.ko
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
